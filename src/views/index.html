<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{appName}}</title>
  <meta name="description" content="YouTube without distractions. No recommendations, no noise, just what you searched for.">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="icon" href="/public/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/style.css">
  <script>window.__YTF_API_URL__ = "{{apiUrl}}";</script>
</head>
<body>

  <!-- ═══ HEADER ═══ -->
  <header id="header">
    <div class="header-start">
      <a class="logo" href="/">
        <svg class="logo-icon" viewBox="0 0 34 24" width="34" height="24" aria-hidden="true">
          <rect x="0" y="0" width="34" height="24" rx="5" fill="#ff0000"/>
          <polygon points="13,6 13,18 25,12" fill="#ffffff"/>
        </svg>
        <span class="logo-wordmark">YouTube<span class="logo-focus">Focus</span></span>
      </a>
    </div>

    <div class="header-center">
      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Search"
          autocomplete="off"
          spellcheck="false"
          aria-label="Search videos"
        >
        <button class="search-btn" id="search-btn" aria-label="Search">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M20.87 20.17l-5.59-5.59A7.01 7.01 0 0017 11a7 7 0 10-7 7 7.01 7.01 0 004.58-1.72l5.59 5.59.7-.7zM4 11a6 6 0 116 6 6 6 0 01-6-6z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="header-end">
      <div id="status-pill" class="status-pill status-checking" title="Server status">
        <span class="status-dot"></span>
        <span class="status-label" id="status-label">connecting…</span>
      </div>
    </div>
  </header>

  <!-- ═══ HERO ═══ -->
  <section id="hero">
    <div class="hero-inner">
      <h1 class="hero-heading">Watch without distraction</h1>
      <p class="hero-sub">No recommendations. No noise. Just what you searched for.</p>
      <div class="hero-search-wrap">
        <div class="search-bar hero-bar">
          <input
            type="text"
            id="hero-input"
            class="search-input"
            placeholder="Search YouTube"
            autocomplete="off"
            spellcheck="false"
            autofocus
          >
          <button class="search-btn" id="hero-btn" aria-label="Search">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
              <path d="M20.87 20.17l-5.59-5.59A7.01 7.01 0 0017 11a7 7 0 10-7 7 7.01 7.01 0 004.58-1.72l5.59 5.59.7-.7zM4 11a6 6 0 116 6 6 6 0 01-6-6z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="hero-shortcuts">
        <kbd>Enter</kbd> search &nbsp;·&nbsp;
        <kbd>F</kbd> fullscreen &nbsp;·&nbsp;
        <kbd>Esc</kbd> close
      </div>
    </div>

    <!-- Recently watched (populated from localStorage) -->
    <section id="recent" class="recent" style="display:none">
      <div class="recent-head">
        <h2 class="recent-title">Recently watched</h2>
        <button class="recent-clear" id="recent-clear" type="button">Clear history</button>
      </div>
      <div class="recent-grid" id="recent-grid"></div>
    </section>
  </section>

  <!-- ═══ LOADING ═══ -->
  <div id="loading" aria-live="polite">
    <div class="spinner" role="status" aria-label="Loading"></div>
  </div>

  <!-- ═══ RESULTS ═══ -->
  <main id="results">
    <p class="results-meta" id="results-meta"></p>
    <div class="results-grid" id="results-grid"></div>
    <div class="load-more-wrap" id="load-more-wrap" style="display:none">
      <button class="btn-load-more" id="load-more-btn">Show more</button>
    </div>
  </main>

  <!-- ═══ MODAL ═══ -->
  <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-bar">
        <span class="modal-title" id="modal-title"></span>
        <div class="modal-controls">
          <button class="modal-ctrl-btn" id="fs-btn" title="Fullscreen (F)">
            <svg id="fs-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
            </svg>
          </button>
          <button class="modal-ctrl-btn close-btn" id="close-btn" title="Close (Esc)">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="player-wrap" id="player-wrap">
        <div id="yt-player"></div>

        <!-- Recommendation blockers -->
        <div class="overlay overlay-tr" aria-hidden="true"></div>

        <div class="overlay overlay-pause" id="overlay-pause" role="button" tabindex="0" aria-label="Resume video">
          <span class="resume-hint">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="vertical-align:middle;margin-right:6px">
              <path d="M8 5v14l11-7z"/>
            </svg>
            Click to resume
          </span>
        </div>

        <div class="overlay overlay-end" id="overlay-end" aria-live="polite">
          <div class="end-card">
            <svg viewBox="0 0 24 24" width="36" height="36" fill="currentColor" style="color:#aaa">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
            </svg>
            <p class="end-label">Video ended</p>
            <div class="end-actions">
              <button class="end-btn" id="replay-btn">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                  <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
                </svg>
                Replay
              </button>
              <button class="end-btn end-btn-primary" id="back-btn">
                Back to results
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ TOAST ═══ -->
  <div id="toast" role="status" aria-live="polite"></div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/public/app.js"></script>
</body>
</html>
