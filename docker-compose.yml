# ------------------------------------------------------------------------------
# YouTube Focus — local orchestration
#
# Default ports are deliberately unusual (12345 / 12346) so they don't collide
# with the common 3000/8000/8080 development ports.
#
# `restart: unless-stopped` ensures the container is restarted automatically
# whenever the Docker daemon starts (i.e. on boot, as long as Docker itself is
# enabled as a service: `systemctl enable docker`).
# ------------------------------------------------------------------------------

services:
  youtube-focus:
    build:
      context: .
      dockerfile: Dockerfile
    image: youtube-focus:latest
    container_name: youtube-focus
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-12345}:${WEB_PORT:-12345}"   # Web UI
      - "${API_PORT:-12346}:${API_PORT:-12346}"   # JSON API
    environment:
      NODE_ENV:               production
      WEB_HOST:               0.0.0.0
      API_HOST:               0.0.0.0
      WEB_PORT:               ${WEB_PORT:-12345}
      API_PORT:               ${API_PORT:-12346}
      API_PUBLIC_URL:         ${API_PUBLIC_URL:-http://localhost:12346}
      INNERTUBE_HL:           ${INNERTUBE_HL:-en}
      INNERTUBE_GL:           ${INNERTUBE_GL:-US}
      INNERTUBE_TIMEOUT_MS:   ${INNERTUBE_TIMEOUT_MS:-10000}
      CORS_ALLOW_ORIGIN:      ${CORS_ALLOW_ORIGIN:-*}
    healthcheck:
      test: ["CMD", "node", "-e", "const p=process.env.API_PORT||12346; require('http').get('http://127.0.0.1:'+p+'/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
